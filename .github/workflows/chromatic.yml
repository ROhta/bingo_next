name: "Chromatic"

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

defaults:
  run:
    shell: bash
    working-directory: "application"

# main への push (Chromatic ベースライン) は並列キャンセルしない。
# PR の push 連投時のみ古いランをキャンセルする。
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    # dependabot PR でもジョブは実行し、chromaui/action の skip: "dependabot**" で
    # ビルドはスキップしつつ Run Chromatic / UI Review / UI Tests を pass として投稿する。
    # ジョブ自体を除外すると必須チェックが未報告のままになり auto-merge がブロックされるため。
    if: |
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e # v18.0.1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          skip: "dependabot**"
          workingDir: "application"
          exitOnceUploaded: true
          autoAcceptChanges: "main"
